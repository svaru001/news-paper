<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Parallax Research — Investment Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/styles.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/primitives.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/discover.jsx"></script>
<script type="text/babel" src="src/reader.jsx"></script>
<script type="text/babel" src="src/screens.jsx"></script>
<script type="text/babel" src="src/tweaks.jsx"></script>

<script>
// Tweakable defaults — host rewrites this block on __edit_mode_set_keys
window.__TWEAKS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "accent": "copper",
  "display": "serif",
  "density": "default",
  "brand": "Parallax"
}/*EDITMODE-END*/;
</script>

<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem("px-screen") || "discover"; }
    catch(e) { return "discover"; }
  });
  const [tw, setTw] = useState(window.__TWEAKS);

  useEffect(() => {
    try { localStorage.setItem("px-screen", screen); } catch(e) {}
    // scroll main back to top on nav
    const m = document.querySelector(".main");
    if (m) m.scrollTop = 0;
  }, [screen]);

  useEffect(() => { window.applyTweaks(tw); }, [tw]);

  // data-screen-label for comment context
  const labelMap = {
    discover: "01 Discover",
    reader:   "02 Insight Reader",
    analyst:  "03 Analyst Profile",
    watch:    "04 Watchlist",
  };

  return (
    <div className="app" data-screen-label={labelMap[screen]}>
      <Sidebar screen={screen} setScreen={setScreen}/>
      <div className="main">
        <Topbar screen={screen}/>
        <TickerTape/>
        {screen === "discover" && <Discover setScreen={setScreen}/>}
        {screen === "reader"   && <Reader   setScreen={setScreen}/>}
        {screen === "analyst"  && <Analyst  setScreen={setScreen}/>}
        {screen === "watch"    && <Watchlist setScreen={setScreen}/>}
      </div>
      <Tweaks tw={tw} setTw={setTw}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
